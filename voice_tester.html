<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentra Voice Tester</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; padding: 40px; color: #1e293b; text-align: center; }
        .card { background: white; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 40px; shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { font-weight: 800; tracking: -0.025em; font-size: 24px; margin-bottom: 20px; }
        select, textarea { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; margin-bottom: 20px; font-size: 14px; box-sizing: border-box; }
        button { background: #0f172a; color: white; border: none; padding: 16px 32px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; width: 100%; }
        button:hover { background: #1e293b; transform: translateY(-2px); }
        p { color: #64748b; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Probador de Voces IA</h1>
        <p>Selecciona una de las voces en español disponibles en tu navegador para escuchar cómo sonaría el briefing de Dentra.</p>
        
        <select id="voice-select">
            <option value="">Cargando voces...</option>
        </select>

        <textarea id="text-to-speak" rows="4">Hola Doctor. Para su próxima cita, Tania Ortiz presenta una leve inflamación en la encía superior que debemos revisar. Su tratamiento de ortodoncia ya va al 80% y hoy es su última sesión de limpieza programada para este ciclo.</textarea>

        <button onclick="speak()">Reproducir Voz</button>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const select = document.getElementById('voice-select');

        function populateVoices() {
            const voices = synth.getVoices().filter(v => v.lang.startsWith('es'));
            select.innerHTML = voices.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
            if (voices.length === 0) select.innerHTML = '<option>No se encontraron voces en español</option>';
        }

        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        function speak() {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(document.getElementById('text-to-speak').value);
            const selectedVoice = select.value;
            utterance.voice = synth.getVoices().find(v => v.name === selectedVoice);
            utterance.pitch = 1;
            utterance.rate = 1;
            synth.speak(utterance);
        }
    </script>
</body>
</html>
